<!doctype html>
<html lang="mn">
  <head>
    <title>MacBook 3D AR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body, html { margin:0; padding:0; height:100%; display:flex; justify-content:center; align-items:center; background:#0a0804; }
      model-viewer { width: 90vw; height: 80vh; border-radius:10px; background:#13100a; }
      #ar-button { font-size:12px; padding:10px 20px; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); }
    </style>
  </head>
  <body>
    <model-viewer
      id="mv"
      src="models/macbook/scene.gltf"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      shadow-intensity="2"
      exposure="0.5"
      shadow-softness="1">

      <button slot="ar-button" id="ar-button">✦ AR харах</button>
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </body>
</html>
